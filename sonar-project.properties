sonar.projectKey=artifacts-oss_daylog
sonar.organization=davidartifacts

# Test execution report paths.
sonar.testExecutionReportPaths=sonar-report.xml
sonar.javascript.lcov.reportPaths=./coverage/lcov.info

# Analyze test files as tests, not as source code.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Configuration and infrastructure files without testable logic.
sonar.coverage.exclusions=*.config.ts,vitest.setup.ts,i18n/**

# json:S2068 flags translation strings like "passwordMin" as hard-coded
# credentials; locale files contain UI copy, not secrets.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=json:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=messages/**

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=daylog
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
